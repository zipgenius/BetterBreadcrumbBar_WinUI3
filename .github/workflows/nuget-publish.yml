# ============================================================
#  BetterBreadcrumbBar.WinUI3 — NuGet build & publish
#
#  Triggers:
#    • Push of a version tag:  git tag v0.9.1 && git push origin v0.9.1
#    • Manual run from the GitHub Actions UI (workflow_dispatch)
#
#  Secrets required for publishing to NuGet.org:
#    NUGET_API_KEY  — your nuget.org API key
#                     (Settings → Secrets and variables → Actions → New secret)
#
#  The .nupkg / .snupkg are always uploaded as run artifacts
#  (downloadable from the Actions tab) regardless of whether
#  the publish step runs.
# ============================================================

name: NuGet — build & publish

on:
  push:
    tags:
      - "v*"            # e.g. git tag v0.9.1 && git push origin v0.9.1

  workflow_dispatch:    # manual trigger from the Actions tab
    inputs:
      publish:
        description: "Publish to NuGet.org?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

env:
  DOTNET_NOLOGO:                     true
  DOTNET_CLI_TELEMETRY_OPTOUT:       true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  CSPROJ: BetterBreadcrumbBar.Control/BetterBreadcrumbBar.Control.csproj

jobs:
  build-and-publish:
    name: Build · Pack · Publish
    runs-on: windows-latest     # WinUI 3 / Windows App SDK requires Windows

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Read version from .csproj ─────────────────────────────────────
      - name: Read package version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "$env:CSPROJ"
          $ver = $csproj.Project.PropertyGroup `
            | ForEach-Object { $_.Version } `
            | Where-Object   { $_ } `
            | Select-Object  -First 1
          if (-not $ver) { Write-Error "Could not read <Version> from $env:CSPROJ"; exit 1 }
          Write-Host "Package version: $ver"
          "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── 3. Setup .NET (all three target frameworks) ───────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      # ── 4. Restore ───────────────────────────────────────────────────────
      - name: Restore NuGet packages
        shell: pwsh
        run: dotnet restore "$env:CSPROJ"

      # ── 5. Build (Release, all TFMs) ─────────────────────────────────────
      - name: Build
        shell: pwsh
        run: |
          dotnet build "$env:CSPROJ" `
            --configuration Release `
            --no-restore `
            /p:TreatWarningsAsErrors=false

      # ── 6. Pack ──────────────────────────────────────────────────────────
      - name: Pack
        shell: pwsh
        run: |
          dotnet pack "$env:CSPROJ" `
            --configuration Release `
            --no-build `
            --output ./nupkg

      # ── 7. Show produced files ───────────────────────────────────────────
      - name: List package files
        shell: pwsh
        run: |
          Write-Host "=== ./nupkg contents ==="
          Get-ChildItem ./nupkg | ForEach-Object {
            Write-Host "$($_.Name)  ($([math]::Round($_.Length/1KB, 1)) KB)"
          }

      # ── 8. Upload artifacts (always) ─────────────────────────────────────
      - name: Upload .nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Upload .snupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: snupkg-${{ steps.version.outputs.VERSION }}
          path: ./nupkg/*.snupkg
          if-no-files-found: warn
          retention-days: 30

      # ── 9. Publish to NuGet.org ──────────────────────────────────────────
      #
      #  Condition: tag push  OR  manual dispatch with publish = "true"
      #  Requires:  NUGET_API_KEY secret
      - name: Publish to NuGet.org
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if (-not $env:NUGET_API_KEY) {
            Write-Error "Secret NUGET_API_KEY is not configured. Add it in: Settings -> Secrets and variables -> Actions -> New repository secret."
            exit 1
          }

          $pkg = Get-ChildItem ./nupkg/*.nupkg | Select-Object -First 1
          if (-not $pkg) {
            Write-Error "No .nupkg found in ./nupkg"
            exit 1
          }
          Write-Host "Pushing: $($pkg.Name)"

          dotnet nuget push $pkg.FullName `
            --api-key      $env:NUGET_API_KEY `
            --source       https://api.nuget.org/v3/index.json `
            --skip-duplicate

          if ($LASTEXITCODE -ne 0) {
            Write-Error "dotnet nuget push failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }

          Write-Host ""
          Write-Host "Published: https://www.nuget.org/packages/BetterBreadcrumbBar.WinUI3/${{ steps.version.outputs.VERSION }}"

      # ── 10. Job summary ──────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        shell: pwsh
        run: |
          $ver     = "${{ steps.version.outputs.VERSION }}"
          $trigger = "${{ github.event_name }}"
          $ref     = "${{ github.ref }}"
          $published = (
            ($trigger -eq 'push' -and $ref -like 'refs/tags/v*') -or
            ($trigger -eq 'workflow_dispatch' -and '${{ github.event.inputs.publish }}' -eq 'true')
          )
          $pkgs = Get-ChildItem ./nupkg -ErrorAction SilentlyContinue `
            | ForEach-Object { "- $($_.Name)  ($([math]::Round($_.Length/1KB,1)) KB)" }
          @"
          ## BetterBreadcrumbBar.WinUI3 $ver

          | Field | Value |
          |---|---|
          | Version | $ver |
          | Trigger | $trigger |
          | Ref | $ref |
          | Published to NuGet.org | $published |

          ### Artifacts
          $($pkgs -join "`n")
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
